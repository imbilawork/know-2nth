<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060A14"/>
      <stop offset="1" stop-color="#121D33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.5" r="0.45">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle dot grid -->
  <g fill="#38BDF8" opacity="0.07">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/><circle cx="320" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="480" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/><circle cx="800" cy="80" r="1.5"/><circle cx="880" cy="80" r="1.5"/><circle cx="960" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1120" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/><circle cx="320" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/><circle cx="480" cy="160" r="1.5"/><circle cx="560" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="720" cy="160" r="1.5"/><circle cx="800" cy="160" r="1.5"/><circle cx="880" cy="160" r="1.5"/><circle cx="960" cy="160" r="1.5"/><circle cx="1040" cy="160" r="1.5"/><circle cx="1120" cy="160" r="1.5"/>
    <circle cx="80" cy="550" r="1.5"/><circle cx="160" cy="550" r="1.5"/><circle cx="240" cy="550" r="1.5"/><circle cx="320" cy="550" r="1.5"/><circle cx="400" cy="550" r="1.5"/><circle cx="480" cy="550" r="1.5"/><circle cx="560" cy="550" r="1.5"/><circle cx="640" cy="550" r="1.5"/><circle cx="720" cy="550" r="1.5"/><circle cx="800" cy="550" r="1.5"/><circle cx="880" cy="550" r="1.5"/><circle cx="960" cy="550" r="1.5"/><circle cx="1040" cy="550" r="1.5"/><circle cx="1120" cy="550" r="1.5"/>
  </g>

  <!-- mandala glyph, right side -->
  <g transform="translate(945, 315)" fill="none" stroke-linecap="round">
    <circle r="170" stroke="#3B82F6" stroke-width="2" opacity="0.85"/>
    <rect x="-160" y="-160" width="320" height="320" stroke="#38BDF8" stroke-width="1.5" opacity="0.65"/>
    <circle r="110" stroke="#38BDF8" stroke-width="1.2" opacity="0.45"/>
    <line x1="0" y1="-200" x2="0" y2="-130" stroke="#38BDF8" stroke-width="2"/>
    <line x1="0" y1="130" x2="0" y2="200" stroke="#38BDF8" stroke-width="2"/>
    <line x1="-200" y1="0" x2="-130" y2="0" stroke="#38BDF8" stroke-width="2"/>
    <line x1="130" y1="0" x2="200" y2="0" stroke="#38BDF8" stroke-width="2"/>
    <circle r="6" fill="#38BDF8" stroke="none"/>
  </g>

  <!-- accent bar -->
  <rect x="80" y="180" width="56" height="4" rx="2" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="80" y="270" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700" fill="#F8FAFC" letter-spacing="-2">know.2nth.ai</text>

  <!-- tagline -->
  <text x="80" y="335" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="400" fill="#7DD3FC">The Knowledge Tree</text>

  <!-- description -->
  <text x="80" y="405" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#94A3B8">Structured domain knowledge — humans read it,</text>
  <text x="80" y="440" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#94A3B8">agents load it as context.</text>

  <!-- domain pills -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#38BDF8">
    <text x="80" y="530">BUSINESS</text>
    <text x="220" y="530">·</text>
    <text x="240" y="530">TECHNOLOGY</text>
    <text x="408" y="530">·</text>
    <text x="428" y="530">DATA</text>
    <text x="500" y="530">·</text>
    <text x="520" y="530">PEOPLE</text>
  </g>
</svg>
